name: Build vmlinux (air GKI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android
          df -h

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: MiCode/Xiaomi_Kernel_OpenSource
          ref: air-t-oss
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libncurses-dev libelf-dev \
            git curl rsync python3 \
            device-tree-compiler \
            clang lld llvm \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            dwarves

      - name: Build kernel
        run: |
          mkdir -p out

          # 【修复 2】提前修复 fuse.h 缺少 <linux/types.h> 导致的头文件测试报错
          sed -i '1i #include <linux/types.h>' include/uapi/linux/fuse.h

          # 【新增修复】清理 Kconfig 警告（自动去除 BOM 头）
          # 修复不支持的不可见字符 (移除 UTF-8 BOM 头)
          if [ -f "drivers/input/touchscreen/lct_tp/Kconfig" ]; then
            sed -i '1s/^\xEF\xBB\xBF//' drivers/input/touchscreen/lct_tp/Kconfig
          fi

          # 【修复 3】彻底移除 pn557 NFC 驱动源码目录。
          # 该驱动依赖厂商自定义的 NFC_PLATFORM_xxx 宏，在通用 gki_defconfig 下
          # 这些宏未被定义，导致 -Werror,-Wimplicit-function-declaration 报错。
          # 仅通过 scripts/config -d NFC_PN557 关闭该选项并不可靠：后续的
          # olddefconfig 会重新计算依赖关系，如果有其他配置 select/default
          # 到 NFC_PN557，该选项会被重新打开，导致驱动仍然被编译进内核。
          # 直接删除源码目录可以彻底、稳定地阻止该驱动被编译。
          rm -rf drivers/nfc/pn557

          # 同步移除 Kconfig 里对已删除目录的 source 引用，否则 gki_defconfig 会报
          # "can't open file drivers/nfc/pn557/Kconfig" 而直接失败
          sed -i '\#source "drivers/nfc/pn557/Kconfig"#d' drivers/nfc/Kconfig

          # 同步移除 Makefile 里对 pn557 子目录的引用。
          # 如果某个 vendor defconfig 片段里残留了 CONFIG_NFC_PN557=y，
          # 即使符号已从 Kconfig 树中移除、后面也用 scripts/config -d 关闭了它，
          # kbuild 仍可能因为孤儿配置项残留而尝试进入已删除的 pn557 目录，
          # 直接从 Makefile 里删掉这一行才能彻底杜绝。
          sed -i '/pn557/d' drivers/nfc/Makefile

          # 调试用：确认两处引用都已清除
          grep -n pn557 drivers/nfc/Kconfig drivers/nfc/Makefile || echo "pn557 引用已彻底清除"

          # 【修复 4】批量移除所有依赖联发科(MediaTek)私有 SCP 协处理器头文件
          # scp.h 的驱动源码目录。scp.h 属于厂商未开源的
          # drivers/misc/mediatek/scp 部分，在这个开源内核树里不存在，
          # 会导致编译报错：fatal error: 'scp.h' file not found
          # （目前已知受影响的至少有 nt36528_spi、ft8057p_spi 两个触摸屏驱动，
          # 不排除还有其他同类驱动）。
          # 与其针对每个驱动逐一手动加 rm -rf，这里改为自动扫描整个 drivers/
          # 目录，找出所有引用了 <scp.h> 的 .c 文件，取其所在目录整体删除，
          # 并清理该目录所在上级 Kconfig/Makefile 里对应的引用行，防止
          # 孤儿 CONFIG 残留导致 kbuild 仍尝试进入已删除的目录。
          for f in $(grep -rl '#include <scp\.h>' drivers --include='*.c'); do
            d=$(dirname "$f")
            name=$(basename "$d")
            parent=$(dirname "$d")
            echo ">>> 移除依赖 scp.h 的驱动目录: $d"
            rm -rf "$d"
            [ -f "$parent/Kconfig" ]  && sed -i "/${name}/d" "$parent/Kconfig"
            [ -f "$parent/Makefile" ] && sed -i "/${name}/d" "$parent/Makefile"
          done

          # 调试用：确认整棵 drivers 树里已经没有残留的 scp.h 引用
          grep -rn '#include <scp\.h>' drivers --include='*.c' \
            && echo "警告：仍有文件引用 scp.h，上面的清理可能不完整" \
            || echo "scp.h 相关驱动引用已彻底清除"

          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            gki_defconfig

          # 在这里追加禁用 NFC 和 LTO 等相关的配置
          scripts/config --file out/.config \
            -d LTO_CLANG \
            -d LTO_CLANG_THIN \
            -d LTO_CLANG_FULL \
            -e LTO_NONE \
            -d IKHEADERS \
            -d NFC_PN557 \
            -d NFC_NXP_NCI

          # 【修复 1】运行 olddefconfig。
          # 因为上面手动修改了 config，会引发依赖变化。这一步自动应用默认值，避免 CI/CD 环境下弹出 Y/n 交互界面导致构建中断。
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            olddefconfig

          set -o pipefail
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            -j$(nproc) 2>&1 | tee build.log

      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: out/vmlinux

      - name: Upload Image (boot kernel binary)
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: out/arch/arm64/boot/Image

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

