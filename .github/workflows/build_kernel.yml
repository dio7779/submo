name: Build vmlinux (air GKI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android
          df -h

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: MiCode/Xiaomi_Kernel_OpenSource
          ref: air-t-oss
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libncurses-dev libelf-dev \
            git curl rsync python3 \
            device-tree-compiler \
            clang lld llvm \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Build kernel
        run: |
          mkdir -p out

          # 【修复 2】提前修复 fuse.h 缺少 <linux/types.h> 导致的头文件测试报错
          sed -i '1i #include <linux/types.h>' include/uapi/linux/fuse.h

          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            gki_defconfig

          # 在这里追加禁用 NFC 和 LTO 等相关的配置
          scripts/config --file out/.config \
            -d LTO_CLANG \
            -d LTO_CLANG_THIN \
            -d LTO_CLANG_FULL \
            -e LTO_NONE \
            -d IKHEADERS \
            -d NFC_PN557 \
            -d NFC_NXP_NCI

          # 【修复 1】运行 olddefconfig。
          # 因为上面手动修改了 config，会引发依赖变化。这一步自动应用默认值，避免 CI/CD 环境下弹出 Y/n 交互界面导致构建中断。
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            olddefconfig

          set -o pipefail
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            -j$(nproc) 2>&1 | tee build.log

      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: out/vmlinux

      - name: Upload Image (boot kernel binary)
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: out/arch/arm64/boot/Image

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
