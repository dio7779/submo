name: Build vmlinux (air GKI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android
          df -h

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: MiCode/Xiaomi_Kernel_OpenSource
          ref: air-t-oss
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libncurses-dev libelf-dev \
            git curl rsync python3 \
            device-tree-compiler \
            clang lld llvm \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Build kernel
        run: |
          mkdir -p out

          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            gki_defconfig

          # 关掉 LTO 避免 OOM，关掉 IKHEADERS 避免找不到 tools/build/cpio
          scripts/config --file out/.config \
            -d LTO_CLANG \
            -d LTO_CLANG_THIN \
            -d LTO_CLANG_FULL \
            -e LTO_NONE \
            -d IKHEADERS

          set -o pipefail
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            -j$(nproc) 2>&1 | tee build.log

      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: out/vmlinux

      - name: Upload Image (boot kernel binary)
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: out/arch/arm64/boot/Image

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
